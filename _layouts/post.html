---
layout: default
---

<article class="post">
  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    <div class="post-meta">
      <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%Y年%-m月%d日" }}</time>
    </div>
    {% if page.tags %}
    <div class="post-tags">
      {% for tag in page.tags %}<span class="tag">{{ tag }}</span>{% endfor %}
    </div>
    {% endif %}
  </header>

  <div class="post-content">
    {{ content }}
  </div>

  <nav class="post-nav">
    {% if page.previous %}
    <a href="{{ site.baseurl }}{{ page.previous.url }}" class="prev">&larr; {{ page.previous.title }}</a>
    {% endif %}
    {% if page.next %}
    <a href="{{ site.baseurl }}{{ page.next.url }}" class="next">{{ page.next.title }} &rarr;</a>
    {% endif %}
  </nav>
</article>
