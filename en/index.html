---
layout: default
title: "Blog - English"
lang: en
---

<h1>Blog Posts</h1>

<div class="post-list">
{% assign posts = site.posts | where: "lang", "en" | sort: date | reverse %}
{% for post in posts %}
  <article class="post-card">
    <h2><a href="{{ post.url }}">{{ post.title }}</a></h2>
    <time>{{ post.date | date: "%B %d, %Y" }}</time>
    <p>{{ post.description }}</p>
  </article>
{% endfor %}
</div>
